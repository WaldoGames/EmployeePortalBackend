name: DAST – ZAP API Scan

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

env:
  API_PORT: 8080
  API_URL: http://localhost:8080
  SWAGGER_URL: http://localhost:8080       # API and Swagger both on 8080 (no HTTPS in CI)

jobs:
  dast:
    name: ZAP API Scan
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    # ── Managed services (health-checked before steps run) ─────────────────
    services:
      # Replaces customer-db (backend-data network)
      customer-db:
        image: postgres:16.2
        env:
          POSTGRES_USER: dast_user
          POSTGRES_PASSWORD: dast_password
          POSTGRES_DB: dast_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Replaces minio (backend-files network)
      minio:
        image: minio/minio:RELEASE.2025-09-07T16-13-09Z
        env:
          MINIO_ROOT_USER: dast_minio
          MINIO_ROOT_PASSWORD: dast_minio_secret
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Start Keycloak (replaces keycloak network dependency) ──────────
      # Keycloak needs ~60 s to start, so launch it early and wait later.
      # --network host lets the API reach it at http://localhost:7080.
      # Adjust the realm/client import to match your production realm export.
      - name: Start Keycloak
        run: |
          docker run -d \
            --name keycloak \
            --network host \
            -e KEYCLOAK_ADMIN=admin \
            -e KEYCLOAK_ADMIN_PASSWORD=admin \
            -e KC_HTTP_ENABLED=true \
            -e KC_HOSTNAME_STRICT=false \
            quay.io/keycloak/keycloak:24.0 \
            start-dev --http-port 7080

      # ── 3. Build the API ───────────────────────────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Restore & publish
        run: |
          dotnet publish EmployeePortalBackend-core.sln \
            --configuration Release \
            --output ./publish \
            --no-self-contained

      # ── 4. Wait for Keycloak ───────────────────────────────────────────────
      - name: Wait for Keycloak
        run: |
          echo "Waiting for Keycloak..."
          timeout 120 bash -c \
            'until curl -sf http://localhost:7080/health/ready; do
               sleep 5
               echo "  still waiting..."
             done'
          echo "Keycloak is up."

      # Optional: import your realm so users/clients exist for the DAST user.
      # Export your realm from a running Keycloak instance with:
      #   /opt/keycloak/bin/kc.sh export --file /tmp/realm.json --realm <your-realm>
      # Then commit the file and uncomment the block below.
      #
      # - name: Import Keycloak realm
      #   run: |
      #     docker exec keycloak \
      #       /opt/keycloak/bin/kc.sh import \
      #         --file /opt/keycloak/data/import/realm.json \
      #         --override true
      #   # Mount the file by adding to the docker run above:
      #   # -v ${{ github.workspace }}/.keycloak/realm.json:/opt/keycloak/data/import/realm.json

      # ── 5. Start the API ───────────────────────────────────────────────────
      # Vault is bypassed entirely: every secret Vault would normally inject
      # is provided directly as an environment variable using .NET's __ separator.
      # Add/adjust variable names to match your app's IConfiguration keys.
      - name: Start API
        run: |
          CONFIG=$(find ./publish -maxdepth 1 -name "*.runtimeconfig.json" | head -1)
          ENTRY="${CONFIG%.runtimeconfig.json}.dll"
          ENTRY_FILENAME=$(basename "$ENTRY")
          echo "Starting: $ENTRY_FILENAME"
          cd ./publish

          # ── Vault bypass: provide all secrets directly ───────────────────
          # Disable the Vault client so it does not attempt to reach vault.internal.example.com
          export Vault__VaultAddress=""
          export Vault__RoleId=""

          # Customer DB (backend-data) — override whatever Vault would inject
          export ConnectionStrings__Customer_db="Host=localhost;Port=5432;Database=dast_db;Username=dast_user;Password=dast_password"

          # MinIO (backend-files)
          export Storage__Endpoint="http://localhost:9000"
          export Storage__AccessKey="dast_minio"
          export Storage__SecretKey="dast_minio_secret"

          # Keycloak / JWT — point at the local instance
          # Adjust key names to match your IConfiguration structure
          export Keycloak__Authority="http://localhost:7080/realms/<your-realm>"
          export Keycloak__ClientId="${{ secrets.DAST_KEYCLOAK_CLIENT_ID }}"
          export Keycloak__ClientSecret="${{ secrets.DAST_KEYCLOAK_CLIENT_SECRET }}"

          # ── Runtime settings ─────────────────────────────────────────────
          export ASPNETCORE_ENVIRONMENT=Testing
          export ASPNETCORE_URLS="http://127.0.0.1:${{ env.API_PORT }}"

          dotnet "$ENTRY_FILENAME" > ../api.log 2>&1 &
          echo "API_PID=$!" >> "$GITHUB_ENV"

      # ── 6. Wait for API ────────────────────────────────────────────────────
      - name: Wait for API to be ready
        run: |
          echo "Waiting for API..."
          timeout 90 bash -c \
            'until curl -sf ${{ env.SWAGGER_URL }}/swagger/v1/swagger.json; do
               sleep 3
               echo "  still waiting..."
             done'
          echo "API is up."

      # Dump the log regardless so startup errors are always visible
      - name: Dump API startup log
        if: always()
        run: cat api.log || echo "(no log yet)"

      # ── 7. Obtain JWT for ZAP ──────────────────────────────────────────────
      - name: Obtain JWT for ZAP
        id: auth
        run: |
          TOKEN=$(curl -sf -X POST ${{ env.API_URL }}/auth/token \
            -H "Content-Type: application/json" \
            -d '{"username":"${{ secrets.DAST_USER }}","password":"${{ secrets.DAST_PASSWORD }}"}' \
            | jq -r '.accessToken')
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      # ── 8. ZAP API scan ────────────────────────────────────────────────────
      - name: ZAP API Scan
        uses: zaproxy/action-api-scan@v0.9.0
        with:
          target: '${{ env.SWAGGER_URL }}/swagger/v1/swagger.json'
          format: openapi
          fail_action: true
          allow_issue_writing: false
          rules_file_name: '.zap/rules.tsv'
          cmd_options: >-
            -z "-config replacer.full_list(0).description=auth
                -config replacer.full_list(0).enabled=true
                -config replacer.full_list(0).matchtype=REQ_HEADER
                -config replacer.full_list(0).matchstr=Authorization
                -config replacer.full_list(0).replacement=Bearer ${{ steps.auth.outputs.token }}"
            -J zap-report.json
            -w zap-report.md
            -r zap-report.html

      # ── 9. Upload reports ──────────────────────────────────────────────────
      - name: Upload ZAP reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-reports-${{ github.run_number }}
          path: |
            zap-report.html
            zap-report.json
            zap-report.md
            api.log
          retention-days: 30

      # ── 10. Post summary to PR ─────────────────────────────────────────────
      - name: Add ZAP summary to PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('zap-report.md')) return;
            const body = fs.readFileSync('zap-report.md', 'utf8').slice(0, 65000);
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ZAP DAST Scan Results\n\n${body}`
            });

      # ── 11. Tear down ──────────────────────────────────────────────────────
      - name: Stop API
        if: always()
        run: kill ${{ env.API_PID }} 2>/dev/null || true

      - name: Stop Keycloak
        if: always()
        run: docker rm -f keycloak 2>/dev/null || true
